apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: document-service
    app.kubernetes.io/environment: dev
  ports:
    - name: http
      port: 5002
      targetPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: prod
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: document-service
    app.kubernetes.io/environment: prod
  ports:
    - name: http
      port: 5002
      targetPort: 5002
