apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: printnow-gateway
  namespace: {{ .Values.targetNamespace }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: {{ .Values.gateway.listenerPort }}
      allowedRoutes:
        namespaces:
          from: Same

