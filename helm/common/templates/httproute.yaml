apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: printnow-route
  namespace: {{ .Values.targetNamespace }}
spec:
  parentRefs:
    - name: printnow-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-service
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /api/documents
      backendRefs:
        - name: document-service
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      backendRefs:
        - name: order-service
          port: 5003
    - matches:
        - path:
            type: PathPrefix
            value: /api/vendors
      backendRefs:
        - name: vendor-service
          port: 5004
    - matches:
        - path:
            type: PathPrefix
            value: /uploads
      backendRefs:
        - name: document-service
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 8080


