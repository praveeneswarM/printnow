namespace: prod
replicaCount: 2
image:
  repository: praveenx03/printnow-vendor-service
  tag: v1.1.0
service:
  type: ClusterIP
  port: 5004
  targetPort: 5004
config:
  PORT: "5004"
  NODE_ENV: production
  MONGO_URI: mongodb://mongodb-0.mongodb.prod.svc.cluster.local:27017/printnow
  VENDOR_REGION: national
  MATCHING_MODE: capacity
secret:
  JWT_SECRET: prod-vendor-service-jwt-secret-2026
  RAZORPAY_KEY_ID: rzp_prod_printnow_vendor
  RAZORPAY_SECRET: prod-printnow-vendor-razorpay-secret
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi

