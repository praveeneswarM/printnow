apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: dev
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: printnow-platform
    app.kubernetes.io/environment: dev
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/environment: dev
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: prod
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: printnow-platform
    app.kubernetes.io/environment: prod
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/environment: prod
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
