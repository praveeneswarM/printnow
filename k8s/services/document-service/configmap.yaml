apiVersion: v1
kind: ConfigMap
metadata:
  name: document-service-config
  namespace: dev
data:
  PORT: "5002"
  NODE_ENV: development
  MONGO_URI: mongodb://mongodb-0.mongodb.dev.svc.cluster.local:27017/printnow
  DOCUMENTS_COLLECTION: documents
  UPLOAD_DIR: uploads
  MAX_UPLOAD_MB: "25"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: document-service-config
  namespace: prod
data:
  PORT: "5002"
  NODE_ENV: production
  MONGO_URI: mongodb://mongodb-0.mongodb.prod.svc.cluster.local:27017/printnow
  DOCUMENTS_COLLECTION: documents
  UPLOAD_DIR: uploads
  MAX_UPLOAD_MB: "50"

