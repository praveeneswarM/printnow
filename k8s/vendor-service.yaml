apiVersion: v1
kind: Service
metadata:
  name: vendor-service
  labels:
    app: vendor-service
spec:
  type: NodePort
  selector:
    app: vendor-service
  ports:
    - port: 5004
      targetPort: 5004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-service
  labels:
    app: vendor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vendor-service
  template:
    metadata:
      labels:
        app: vendor-service
    spec:
      containers:
        - name: vendor-service
          image: praveenx03/printnow-vendor-service:v1.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5004
          envFrom:
            - configMapRef:
                name: printnow-config
          env:
            - name: PORT
              value: "5004"
            - name: RAZORPAY_KEY_ID
              value: "rzp_test_SgxwwTh05ycq20"
            - name: RAZORPAY_SECRET
              value: "ib19bXnXUxULKn56i0kv7HsQ"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          