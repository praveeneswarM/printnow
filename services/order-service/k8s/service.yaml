apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/environment: dev
  ports:
    - name: http
      port: 5003
      targetPort: 5003
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: prod
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/environment: prod
  ports:
    - name: http
      port: 5003
      targetPort: 5003
