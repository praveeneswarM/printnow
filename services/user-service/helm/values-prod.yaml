namespace: prod
replicaCount: 2
image:
  repository: praveenx03/printnow-user-service
  tag: v1.1.0
service:
  type: ClusterIP
  port: 5001
  targetPort: 5001
config:
  PORT: "5001"
  NODE_ENV: production
  MONGO_URI: mongodb://mongodb-0.mongodb.prod.svc.cluster.local:27017/printnow
  USERS_COLLECTION: users
  JWT_EXPIRES_IN: 12h
secret:
  JWT_SECRET: prod-printnow-jwt-secret-2026
  RAZORPAY_KEY_ID: rzp_prod_printnow_user
  RAZORPAY_SECRET: prod-printnow-user-razorpay-secret
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi

