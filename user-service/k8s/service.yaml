apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/environment: dev
  ports:
    - name: http
      port: 5001
      targetPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: prod
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/environment: prod
  ports:
    - name: http
      port: 5001
      targetPort: 5001
